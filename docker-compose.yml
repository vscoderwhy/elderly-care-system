version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: elderly-care-postgres
    environment:
      POSTGRES_DB: elderly_care_db
      POSTGRES_USER: elderly_care
      POSTGRES_PASSWORD: ${DB_PASSWORD:-elderly_care_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - elderly-care-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elderly_care"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: elderly-care-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - elderly-care-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端 API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: elderly-care-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: elderly_care
      DB_PASSWORD: ${DB_PASSWORD:-elderly_care_password}
      DB_NAME: elderly_care_db
      REDIS_ADDR: redis:6379
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_key}
      GIN_MODE: release
    volumes:
      - upload_data:/uploads
      - ./backend/config.yaml:/app/config.yaml
    ports:
      - "8080:8080"
    networks:
      - elderly-care-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # 管理后台前端
  admin-frontend:
    build:
      context: ./admin-frontend
      dockerfile: Dockerfile
    container_name: elderly-care-admin-frontend
    ports:
      - "8081:80"
    networks:
      - elderly-care-network
    depends_on:
      - backend
    restart: unless-stopped

  # 移动端 H5
  mobile-frontend:
    build:
      context: ./uniapp-elderly-care
      dockerfile: Dockerfile
    container_name: elderly-care-mobile-frontend
    ports:
      - "8082:80"
    networks:
      - elderly-care-network
    depends_on:
      - backend
    restart: unless-stopped

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: elderly-care-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - upload_data:/var/www/uploads:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - elderly-care-network
    depends_on:
      - admin-frontend
      - mobile-frontend
      - backend
    restart: unless-stopped

  # Prometheus 监控
  prometheus:
    image: prom/prometheus:latest
    container_name: elderly-care-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - elderly-care-network
    restart: unless-stopped

  # Grafana 可视化
  grafana:
    image: grafana/grafana:latest
    container_name: elderly-care-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3000:3000"
    networks:
      - elderly-care-network
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  upload_data:
  prometheus_data:
  grafana_data:

networks:
  elderly-care-network:
    driver: bridge
