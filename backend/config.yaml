server:
  port: 8080
  mode: debug  # debug, release
  readTimeout: 60s
  writeTimeout: 60s

database:
  host: localhost
  port: 5432
  user: postgres
  password: postgres
  dbName: elderly_care
  sslmode: disable

redis:
  host: localhost
  port: 6379
  password: ""
  db: 0

jwt:
  secret: your-secret-key-change-in-production
  expireTime: 168h  # 7天

upload:
  maxSize: 10485760  # 10MB
  path: ./uploads
  allowedExts:
    - .jpg
    - .jpeg
    - .png
    - .gif
    - .pdf
    - .doc
    - .docx
    - .xls
    - .xlsx
